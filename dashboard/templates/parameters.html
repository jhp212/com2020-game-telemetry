{% extends "base.html" %}
{% block content %}

<h2>Parameters</h2>

<div class="table-container">
  <table id="parameterTable">
    <thead>
      <tr>
        <th>Parameter Name</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      {% for r in parameter_rows %}
        <tr class="param-row">
          <td class="param-name">{{ r.name }}</td>
          <td class="param-value" contenteditable="true">{{ r.value }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <button onclick="saveAllChanges()" id="save-btn">Save All Changes</button>
  
  <div id="status-display" style="display:none; margin-top:10px; padding:10px; border-radius:4px;"></div>
</div>

<script>
  // Save Button to execute the POST action
async function saveAllChanges() {
    const rows = document.querySelectorAll('.param-row');
    const saveBtn = document.getElementById('save-btn');
    const statusBox = document.getElementById('status-display');

    saveBtn.disabled = true;
    saveBtn.innerText = "Saving...";

    for (const row of rows) {
        const name = row.querySelector('.param-name').innerText.trim();
        const rawValue = row.querySelector('.param-value').innerText.trim();
        const value = parseFloat(rawValue);

        if (isNaN(value)) {
            console.error("Invalid number for", name);
            continue;
        }

        const response = await fetch("/parameters/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    value: value
                })
            });

    }

    saveBtn.disabled = false;
    saveBtn.innerText = "Save All Changes";
    
    statusBox.style.display = "block";
    statusBox.style.background = "#49751c";
    statusBox.innerText = "All parameters saved successfully";
}
</script>
{% endblock %}
