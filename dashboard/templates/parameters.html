{% extends "base.html" %}
{% block content %}

<h2>Parameters</h2>

<div class="table-container">
  <table id="parameterTable">
    <thead>
      <tr>
        <th>Parameter Name</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      {% for r in parameter_rows %}
        <tr class="param-row">
          <td class="param-name">{{ r.name }}</td>
          <td class="param-value" contenteditable="true" data-original="{{ r.value }}">{{ r.value }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <button id="save-btn">Save All Changes</button>

  <div id="decisionModel">
  <div id="pop-up-container">
    
    <h3>Decision Justification</h3>

    <label>Evidence</label>
    <textarea id="evidenceInput" rows="3" style="width:100%"></textarea>

    <label>Rationale</label>
    <textarea id="rationaleInput" rows="3" style="width:100%"></textarea>

    <div style="margin-top:15px; text-align:right;">
      <button onclick="closeModel()">Cancel</button>
      <button onclick="submitDecision()">Confirm</button>
    </div>
  </div>
</div>


<script>
  document.addEventListener("DOMContentLoaded", () => {

    let pendingChanges = [];

    document.getElementById("save-btn").addEventListener("click", () => {
      pendingChanges = [];

      document.querySelectorAll(".param-row").forEach(row => {
        const name = row.querySelector(".param-name").innerText.trim();
        const cell = row.querySelector(".param-value");

        const original = parseFloat(cell.dataset.original);
        const current = parseFloat(cell.innerText);

        if (!isNaN(current) && current !== original) {
          pendingChanges.push({
            parameter_name: name,
            old_value: original,
            new_value: current,
            change: current - original
          });
        }
      });

      if (pendingChanges.length === 0) {
        alert("No changes detected");
        return;
      }

      document.getElementById("decisionModel").style.display = "block";
    });

    window.submitDecision = async function () {
      const evidence = document.getElementById("evidenceInput").value.trim();
      const rationale = document.getElementById("rationaleInput").value.trim();

      if (!evidence || !rationale) {
        alert("Evidence and rationale are required");
        return;
      }

      const now = new Date().toISOString();

      for (const c of pendingChanges) {
        const resp = await fetch("/decision_logs/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            parameter_name: c.parameter_name,
            stage_id: 0,
            change: `${c.change > 0 ? "+" : ""}${c.change}`,
            rationale: rationale,
            evidence: evidence,
            dateTime: now
          })
        });

        if (!resp.ok) {
          alert("Decision log POST failed");
          return;
        }

        const paramResp = await fetch("/parameters/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: c.parameter_name,
            value: c.new_value
          })
        });

        if (!paramResp.ok) {
          alert("Parameter update failed");
          return;
        }
      }

      location.reload();
    };

    window.closeModel = function () {
      document.getElementById("decisionModel").style.display = "none";
    };

});
</script>
{% endblock %}
