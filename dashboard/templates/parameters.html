{% extends "base.html" %}
{% block content %}
<div style="margin-left:150px;padding:1px 16px;height:1px;">
  <h2>Parameters</h2>

  <table>
    <thead>
      <tr>
        <th>Parameter Name</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      {% for r in decision_log_rows %}
        <tr>
          <td>{{ r.name }}</td>
          <td>{{ r.value }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
