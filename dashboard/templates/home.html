{% extends "base.html" %}

{% block content %}
<div class="page">
  <h1>{{ title }}</h1>

  <section class="graphs">
    <div class="graph half">
      <h3>Telemetry Type Counts</h3>
      <div class="chartWrap">
        <canvas id="telemetryFunnel"></canvas>
      </div>
    </div>
    <div class="graph half">
      <h3>Drop Off Points</h3>
      <div class="chartWrap">
        <canvas id="dropOffsChart"></canvas>
      </div>
    </div>
    <div class="graph full">
      <h3>Stage Start vs Finish</h3>
      <div class="chartWrap">
        <canvas id="stageConversionChart"></canvas>
      </div>
    </div>
     <div class="graph full">
      <h3>Enemy Difficulty Heatmap</h3>
      <div class="chartWrap">
        <canvas id="enemyDifficultyHeatmap"></canvas>
      </div>
    </div>
    <div class="graph full">
      <h3>Economy Balance</h3>
      <div class="chartWrap">
        <canvas id="economyBalanceChart"></canvas>
      </div>
    </div>
  </section>
</div>


<!-- We will use chart.js for the visual representation of data --> 
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix"></script>
<script>
  const funnelLabels = {{ type_labels_json | safe }};
  const funnelValues = {{ type_values_json | safe }};

  const stageLabels = {{ stage_labels_json | safe }};
  const stageValues = {{ stage_starts_json | safe }};

  const stageIdLabels = {{ stage_id_labels_json | safe }};
  const stageStarted = {{ stage_started_json | safe }};
  const stageFinished = {{ stage_finished_json | safe }};

  const heatmapStageLabels = {{ heatmap_stage_labels_json | safe }};
  const heatmapMetricLabels = {{ heatmap_metric_labels_json | safe }};
  const heatmapData = {{ heatmap_data_json | safe }};

  const economyLabels = {{ economy_labels_json | safe }};
  const avgMoneySpent = {{ avg_money_spent_json | safe }};
  const estMoneyEarned = {{ est_money_earned_json | safe }};


  /* Telemetry Chart */
  // Now a horizontal funnel view chart, TO DO: descending order from the top
  new Chart(document.getElementById("telemetryFunnel"), {
    type: "bar",
    data: {
        labels: funnelLabels,
        datasets: [{
            label: "Telemetry Events",
            data: funnelValues
        }]
    },
    options: {
        indexAxis: "y", 
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                display: false
            },
            tooltip: {
                callbacks: {
                    label: ctx => `${ctx.raw} events`
                }
            }
        },
        scales: {
            x: {
                beginAtZero: true,
                grid: {
                    drawBorder: false
                }
            },
            y: {
                reverse: true,
                grid: {display: false}
            }
        }
    }
  });
  
  
  new Chart(document.getElementById("dropOffsChart"), {
    type: "bar",
    data: {
      labels: stageLabels,
      datasets: [{ label: "Stage Starts", data: stageValues }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });

  // observing how many users manage to complete each level
  new Chart(document.getElementById("stageConversionChart"), {


    type: "bar",
    data: {
      labels: stageIdLabels,
      
      datasets: [
        {
          label: "Finished",
          data: stageFinished,
        },
        {
          label: "Started",
          data: stageStarted,
        }
        
      ]
    },

    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: "top" },
        tooltip: { mode: "index", intersect: false }
      },
      scales: {
        x: {
          title: { display: true, text: "Stage" },
          stacked: true
        },
        y: {

          beginAtZero: true,
          title: { display: true, text: "Completion" },
          
        }
      }
    }
  });

   // Enemy Difficulty Heatmap
  new Chart(document.getElementById("enemyDifficultyHeatmap"), {

    type: "matrix",
    data: {


      datasets: [{
        label: "Difficulty Heatmap",
        data: heatmapData,

        width: ({chart}) => {
          const area = chart.chartArea || {};
          return area.width ? area.width / Math.max(heatmapStageLabels.length, 1) - 4 : 40;

        },
        height: ({chart}) => {

          const area = chart.chartArea || {};
          return area.height ? area.height / Math.max(heatmapMetricLabels.length, 1) - 4 : 40;
        },
        backgroundColor(ctx) {
          const value = ctx.dataset.data[ctx.dataIndex].v || 0;
          const alpha = Math.min(0.9, Math.max(0.15, value / 100));
          return `rgba(79, 29, 138, ${alpha})`;
        },
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            title() {
              return "";
            },
            label(ctx) {
              const point = ctx.raw;
              return `Stage ${point.x} | ${point.y}: ${point.v}`;
            }
          }
        },
        legend: {
          display: false
        }
      },

      scales: {

        x: {
          type: "category",
          labels: heatmapStageLabels,
          title: {
            display: true,
            text: "Stage"
          },
          offset: true,
          grid: {
            display: false
          }
        },
        y: {
          type: "category",
          labels: heatmapMetricLabels,
          title: {
            display: true,
            text: "Metric"
          },

          offset: true,
          grid: {
            display: false
          }
        }
      }
    }
  });

  // Economy Balance Chart
  new Chart(document.getElementById("economyBalanceChart"), {
    type: "bar",
    data: {
      labels: economyLabels,
      datasets: [
        {
          label: "Average Money Spent",
          data: avgMoneySpent,
        },
        {
          label: "Estimated Money Earned",
          data: estMoneyEarned,
          type: "line"
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: "top"
        },
        tooltip: {
          mode: "index",
          intersect: false
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: "Stage"
          }
        },
        y: {
          beginAtZero: true,
          title: {
            display: true,
            text: "Economy Value"
          }
        }
      }
    }
  });


</script>
{% endblock %}
