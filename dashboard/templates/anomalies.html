{% extends "base.html" %}
{% block content %}

<h2>Anomalies</h2>

<div style="display: flex; gap: 12px; margin-bottom: 20px;">
    <form action="/anomalies/run" method="post">
        <button type="submit">Run Anomaly Detection</button>
    </form>

    <form action="/anomalies/clear" method="post" onsubmit="return confirm('Are you sure you want to delete all anomalies and their linked telemetry records?');">
        <button type="submit">Clear All Anomalies</button>
    </form>
</div>

<table>
    <thead>
      <tr>
        <th>Anomaly Category</th>
        <th>Reasoning</th>
        <th>Evidence</th>
      </tr>
    </thead>
    <tbody>
      {% for a in anomaly_response %}
        <tr>
          <td>{{ a.anomaly_category }}</td>
          <td>{{ a.reasoning }}</td>
          <td>{{ a.evidence }}</td>
        </tr>
      {% endfor %}
    </tbody>
</table>

{% endblock %}
