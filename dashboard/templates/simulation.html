{% extends "base.html" %}
{% block content %}
<style>
    #TestDifficultySelect {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  padding: 7px 32px 7px 12px;
  font-size: 13px;
  font-family: inherit;
  border-radius: 12px;
  border: 1px solid #444;
  background-color: #1e1e1e;
  background-image:
    linear-gradient(45deg, transparent 50%, #ccc 50%),
    linear-gradient(135deg, #ccc 50%, transparent 50%);
  background-position:
    calc(100% - 14px) center,
    calc(100% - 9px) center;
  background-size: 5px 5px;
  background-repeat: no-repeat;
  color: #eaeaea;
  cursor: pointer;
  width: auto;
  min-width: 110px;
  box-shadow: inset 0 -1px 2px rgba(0,0,0,0.3);
  transition: border-color 0.3s ease, box-shadow 0.4s ease;
}

#TestDifficultySelect:hover {
  border-color: #555;
  box-shadow: 0 4px 8px -2px rgba(79, 29, 138, 0.75), inset 0 -1px 2px rgba(0,0,0,0.2);
}

#TestDifficultySelect:focus {
  outline: none;
  border-color: #666;
  box-shadow: 0 0 0 2px rgba(79, 29, 138, 0.3), inset 0 -1px 2px rgba(0,0,0,0.2);
}

#TestDifficultySelect option {
  background-color: #1e1e1e;
  color: #eaeaea;
}
</style>
<h2>Simulation</h2>


<div id="sim-page-container">
    <section id="sim-left">

    <select id="TestDifficultySelect">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        
    </select>
    <div>
    <label>Number of Tests to Run</label>
    </div>

    <input id="TestCountInput" rows="2" style="width:50%">


    <div>
        <label>Level to be Tested</label>
    </div>

    <input id="TestLevelInput" rows="2" style="width:10%">

    <div>
        <button id="test-btn">Commence Test</button>
    </div>

    </section>

    <section id="sim-right">
        <table id="testTable">
            <thead>
            <tr>
                <th>Test Success Rate</th>
                <th>Suggested Follow-up Action</th>
            </tr>
            </thead>
            <tbody>
                <!--will fill with results from python tests script-->
            </tbody>
        </table>
    </section>

</div>

<div id="loading-overlay" class="hidden">
    <div class="spinner"></div>
</div>

<script>
    document.getElementById("test-btn").addEventListener("click", runTest);
    


    async function runTest() {
        const overlay = document.getElementById("loading-overlay");
        overlay.classList.remove("hidden");

        const testDifficulty = document.getElementById("TestDifficultySelect").value;
        const testCount = document.getElementById("TestCountInput").value;
        const testLevel = document.getElementById("TestLevelInput").value;

        try {
            
            const response = await fetch("/simulation/run", {
                method: "POST",
                credentials: 'same-origin',
                headers: {"Content-Type": "application/json"},

                body: JSON.stringify({
                    test_difficulty: testDifficulty,
                    test_count: Number(testCount),
                    level: Number(testLevel)
                })
            });

            const text = await response.text();

            console.log("RAW RESPONSE:", text);


            const data = JSON.parse(text);
            console.log("PARSED:", data);

            fillTable(data);

        } finally {
            overlay.classList.add("hidden");
        }
    }

    function fillTable(data) {
        const tbody = document.querySelector("#testTable tbody");
        tbody.innerHTML = "";

    
        if (Array.isArray(data)) {
            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${Number(row.success_rate).toFixed(1)}%</td><td>${row.suggestedAction}</td>`;
                tbody.appendChild(tr);
            });
            return;
        }

    
        if (data.success_rate !== undefined) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${Number(data.success_rate).toFixed(1)}%</td><td>${data.suggestedAction}</td>`;
            tbody.appendChild(tr);
            return;
        }

        
        console.error("Unexpected response:", data);
    }

</script>
{% endblock %}
