<!DOCTYPE html>
<html >
    <head>
        <style>
            body {
                display: flex;
                background-color: #3B3B3B;
                height: 100vh;
                margin: 0;
                justify-content: center;
                align-items: center;
            }

            .loginBox {
                background-color: darkgray;
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 420px;
                min-height: 520px;
                border: 3px solid black;
                box-shadow: 5px 10px rgba(79, 29, 138, 0.863);
                padding: 40px 28px;
                box-sizing: border-box;
            }

            .loginBox h1 {
                font-size: 60px;
                font-style: italic;
                margin: 60px 0 40px 0;
            }

            form {
                display: flex;
                flex-direction: column;
                width: 100%;
                align-items: center;
            }

            input[type="text"],
            input[type="password"] {
                width: 100%;
                height: 42px;
                margin-top: 16px;
                border: none;
                border-radius: 30px;
                background-color: rgb(224, 231, 236);
                padding: 0 10px;
                box-sizing: border-box;
            }

             .annoyingRow {
            display: flex;
            margin-top: 20px; 
            align-items: center;
            width: calc(100% - 20px);
            justify-content: space-between;
        }

        .wrapPls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
            input[type="checkbox"] {
                width: 16px;
                height: 16px;
            }

            input[type="submit"],
            .loginButton {
                min-width: 120px;
                height: 42px;
                border-radius: 30px;
                font-size: 15px;
                background-color: rgba(79, 29, 138, 0.863);
                font-weight: bold;
                color: black;
                border: 2px solid black;
                box-shadow: 3px 5px black;
                font-style: italic;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                padding: 0 10px;
            }

            input[type="submit"]:hover{
                opacity: 0.7;
            }

            .loginError {
                color: #b00020;
                font-weight: 600;
                margin-bottom: 12px;
                text-align: center;
            }
        .signupRow {
            display: flex;
            align-items: center;
            width: calc(100% - 20px);
            margin-top: 25px;
            padding-top: 30px;
            padding-bottom: 20px;
        }

        .lines {
            flex: 1;
            border-bottom: 2px solid #000;
        }

        .signupContainer {
            display: flex;
            align-items: center;
            margin: 0 10px;
            cursor: pointer;
        }

        .signupText {
            font-weight: bold;
            color: black;
            margin-right: 6px;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid black;
            display: inline-block;
        }
        </style>


    </head>

    <body>
        <div class="loginBox">
            <h1>LOGIN</h1>

            <form method="POST" action="/login">
                {% if error %}
                <div class="loginError">{{ error }}</div>
                {% endif %}

                <input id="user" name="username" type="text" placeholder="Username" minlength="3" maxlength="20" required>
                <input id="pass" name="password" type="password" placeholder="Password" minlength="6" required>

                <div class="annoyingRow">
                <div class="wrapPls">
                    <input id="remember" name="remember" type="checkbox">
                    <span>Remember me?</span>
                </div>
                <input type="submit" value="SIGN IN">
            </div>

            <div class="signupRow">
                <div class="lines"></div>
                <div class="signupContainer" id="signupButton">
                    <span class="signupText">Sign Up</span>
                    <span class="triangle"></span>
                </div>
                <div class="lines"></div>
            </div>
        </form>
    </div>
    </body>
    <script>
    document.getElementById("signupButton").addEventListener("click", function() {
        window.location.href = "/register";
    });
</script>
</html>
