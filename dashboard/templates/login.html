<!DOCTYPE html>
<html >
    <head>
        <style>
            body {
                display: flex;
                background-color: #3B3B3B;
                height: 100vh;
                margin: 0;
                justify-content: center;
                align-items: center;
            }

            .loginBox {
                background-color: darkgray;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                width: 420px;
                min-height: 520px;
                border: 3px solid black;
                box-shadow: 5px 10px rgba(79, 29, 138, 0.863);
                padding: 40px 28px;
                box-sizing: border-box;
            }

            .loginBox h1 {
                font-size: 60px;
                font-style: italic;
                margin: 60px 0 40px 0;
            }

            form {
                display: flex;
                flex-direction: column;
                width: 100%;
                align-items: center;
            }

            input[type="text"],
            input[type="password"],
            input[type="email"] {
                width: 100%;
                height: 42px;
                margin-bottom: 16px;
                border: none;
                border-radius: 30px;
                background-color: rgb(224, 231, 236);
                padding: 0 14px;
                box-sizing: border-box;
            }

            .bottomRow {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 18px;
                margin-top: 8px;
            }

            .rememberWrap {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 14px;
                cursor: pointer;
            }

            input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin: 0;
            }

            .buttonRow {
                display: flex;
                justify-content: center;
                gap: 14px;
                width: 100%;
            }

            input[type="submit"],
            .loginButton {
                width: 120px;
                height: 42px;
                border-radius: 30px;
                font-size: 15px;
                background-color: rgba(79, 29, 138, 0.863);
                font-weight: bold;
                color: black;
                border: 2px solid black;
                box-shadow: 3px 5px black;
                font-style: italic;
                text-decoration: none;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
                cursor: pointer;
                padding: 0;
            }

            input[type="submit"]:hover,
            .loginButton:hover {
                opacity: 0.7;
            }

            .loginError {
                color: #b00020;
                font-weight: 600;
                margin-bottom: 12px;
                text-align: center;
            }
        </style>


    </head>

    <body>
        <div class="loginBox">
            <h1>LOGIN</h1>

            <form method="POST" action="/login">
                {% if error %}
                <div class="loginError">{{ error }}</div>
                {% endif %}

                <input id="user" name="username" type="text" placeholder="Username" required>
                <input id="pass" name="password" type="password" placeholder="Password" required>

                <div class="bottomRow">
                    <label class="rememberWrap" for="remember">
                        <input id="remember" name="remember" type="checkbox">
                        <span>Remember me?</span>
                    </label>

                    <div class="buttonRow">
                        <a href="/register" class="loginButton">REGISTER</a>
                        <input type="submit" value="SIGN IN">
                    </div>
                </div>
            </form>
        </div>
    </body>
</html>
