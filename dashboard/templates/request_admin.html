{% block content %}

 <link rel="stylesheet" href="static/css/style.css">
 <style>
    body{
        background-color: #3B3B3B;
        color: white;
        padding-left: 20px;
    }

    .back {
        appearance: none;
        backface-visibility: hidden;
        background-color: #27ae60;
        border-radius: 8px;
        border-style: none;
        box-shadow: rgba(39, 174, 96, .15) 0 4px 9px;
        box-sizing: border-box;
        color: #fff;
        cursor: pointer;
        display: inline-block;
        font-family: Inter,-apple-system,system-ui,"Segoe UI",Helvetica,Arial,sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: normal;
        line-height: 1.5;
        outline: none;
        overflow: hidden;
        padding: 13px 20px;
        position: relative;
        text-align: center;
        text-decoration: none;
        transform: translate3d(0, 0, 0);
        transition: all .3s;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        vertical-align: top;
        white-space: nowrap;
    }

    .back:hover {
        background-color: #1e8449;
        opacity: 1;
        transform: translateY(0);
        transition-duration: .35s;
        box-shadow: rgba(39, 174, 96, .2) 0 6px 12px;
        }

        .back:active {
        transform: translateY(2px);
        transition-duration: .35s;
    }
 </style>
<h2>Admin access required</h2>

<p>
    Your account is logged in successfully, but you do not currently have admin access
    to use the dashboard.
</p>

<p>
    You can submit a request below. An existing admin can then approve your access.
</p>

{% if message %}
    <p><strong>{{ message }}</strong></p>
{% endif %}

<form action="/request_admin" method="post">
    <button type="submit">Request Admin Access</button>
    <a class="back" href="/logout">Login</a>
</form>
{% endblock %}
