{% block content %}

 <link rel="stylesheet" href="static/css/style.css">
<style>
body {
    background: #3B3B3B;
    color: #ffffff;
    font-family: 'Inter', -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 480px;
    margin: 100px auto;
    background: #1F1F1F;
    padding: 40px 30px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

p {
    margin-bottom: 18px;
    color: #e5e2e2;
}

.requestButton, .login {
    display: block;
    width: 100%;
    margin: 12px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
}

.requestButton {
    background: linear-gradient(90deg, #4f1d8a, #7b39ff);
    color: white;
    box-shadow: 0 6px 12px rgba(79,29,138,0.5);
}

.requestButton:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(79,29,138,0.6);
}

.login {
    background-color: #2a2a2a;
    opacity: 0.6;
    color: #ffffff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}

.login:hover {
    opacity: 1;
    background-color: #2a2a2a;
    box-shadow: 0 4px 8px rgba(79,29,138,0.5);
}

.message {
    margin-top: 15px;
    font-size: 0.95rem;
    color: #8ef58e;
}
</style>

<div class="container">

<h2>Admin access required</h2>

<p>
    Your account is logged in successfully, but you do not currently have admin access
    to use the dashboard.
</p>

<p>
    You can submit a request below. An existing admin can then approve your access.
</p>

{% if message %}
<p class="message"><strong>{{ message }}</strong></p>
{% endif %}

<form action="/request_admin" method="post">
    <button class="requestButton" type="submit">
        Request Admin Access
    </button>
</form>

<button class="login" id="login">Back to Login</button>

</div>
<script>
    document.getElementById("login").addEventListener("click", function(){
        window.location.href = "/logout"
    });
</script>
{% endblock %}
