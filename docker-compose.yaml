services:
  database_api:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: game-telemetry-database-api
    ports:
      - "10101:10101"
    volumes:
      - ./database:/app
  
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: game-telemetry-dashboard
    ports:
      - "10102:10102"
    volumes:
      - ./dashboard:/app